<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Follower Tracker | Ffhhchicho_ac2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .btn-reset {
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-reset:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: rgba(255, 0, 0, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-500 rounded-full pulse"></div>
                <span class="text-[10px] font-bold tracking-widest uppercase text-gray-500">Live</span>
            </div>
            <span id="update-timer" class="text-xs text-gray-500 font-mono">Updating in 10s</span>
        </div>

        <!-- Main Info -->
        <div class="text-center mb-10">
            <h1 class="text-2xl font-semibold text-gray-300 mb-1">Ffhhchicho_ac2</h1>
            <p class="text-sm text-gray-500 mb-6">User ID: 4886651930</p>
            
            <div id="follower-count" class="text-7xl font-extrabold tracking-tighter text-white mb-2">
                ---
            </div>
            <p class="text-gray-400 uppercase text-xs tracking-widest font-bold">Total Followers</p>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                <p class="text-gray-500 text-xs mb-1">Growth Rate</p>
                <p id="growth-rate" class="text-xl font-bold text-green-400">+0.00 <span class="text-xs font-normal">/hr</span></p>
            </div>
            <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                <p class="text-gray-500 text-xs mb-1">Session Gain</p>
                <p id="session-gain" class="text-xl font-bold text-blue-400">+0</p>
            </div>
        </div>

        <!-- Footer Info & Controls -->
        <div class="mt-8 pt-6 border-t border-white/10 flex flex-col items-center gap-4">
            <button id="reset-session" class="btn-reset text-[10px] uppercase tracking-widest font-bold text-gray-400 px-4 py-2 rounded-full border border-white/10">
                Reset Session Stats
            </button>
            <p id="status-msg" class="text-[10px] text-gray-600 italic">Connecting...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc, collection, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const USER_ID = "4886651930";
        const PROXY_URL = "https://corsproxy.io/?";
        const API_URL = `https://friends.roblox.com/v1/users/${USER_ID}/followers/count`;

        let sessionData = { startCount: null, startTime: null };
        let lastKnownFollowerCount = null;
        let countdown = 10;
        let useCloud = false;
        let db, appId;

        const MY_PERSONAL_CONFIG = {
            apiKey: "AIzaSyC0lm0o9MMqeftSqomy10NpaaTFLH2t8JY",
            authDomain: "followers-tracker-9d7bb.firebaseapp.com",
            projectId: "followers-tracker-9d7bb",
            storageBucket: "followers-tracker-9d7bb.firebasestorage.app",
            messagingSenderId: "22399555455",
            appId: "1:22399555455:web:c4b68dddf4d5bc1cc7ac4a",
            measurementId: "G-30D19BRHNQ"
        };

        // UI Helpers
        const setStatus = (msg) => document.getElementById('status-msg').innerText = msg;
        const setFollowers = (val) => document.getElementById('follower-count').innerText = val.toLocaleString();

        async function init() {
            // 1. Immediately load from LocalStorage so the user sees data instantly
            const localSaved = localStorage.getItem('rbx_session');
            if (localSaved) {
                sessionData = JSON.parse(localSaved);
                setStatus("Using Local Data...");
            }

            // 2. Start the fetch loop immediately (don't wait for Firebase)
            startLoops();

            // 3. Try to connect to Firebase in the background
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const config = JSON.parse(__firebase_config);
                    await startFirebase(config, typeof __app_id !== 'undefined' ? __app_id : 'roblox-tracker-app');
                } else if (MY_PERSONAL_CONFIG) {
                    await startFirebase(MY_PERSONAL_CONFIG, 'global-follower-session');
                }
            } catch (e) {
                console.error("Firebase connection failed", e);
                setStatus("Offline Mode (Local Only)");
            }
        }

        async function startFirebase(config, targetAppId) {
            const app = initializeApp(config);
            const auth = getAuth(app);
            db = getFirestore(app);
            appId = targetAppId;

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    useCloud = true;
                    // Attempt to pull latest cloud session
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'session_storage', 'current');
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        sessionData = snap.data();
                        localStorage.setItem('rbx_session', JSON.stringify(sessionData));
                    }
                    setStatus("Cloud Synced (10s)");
                    setupCloudSync();
                }
            });
        }

        function setupCloudSync() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'session_storage', 'current');
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    sessionData = snapshot.data();
                    localStorage.setItem('rbx_session', JSON.stringify(sessionData));
                    if (lastKnownFollowerCount !== null) updateUI(lastKnownFollowerCount);
                }
            }, (err) => setStatus("Sync Suspended"));
        }

        async function saveToHistory(count) {
            if (!useCloud || !db || !appId) return;
            const now = Date.now();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'history', now.toString());
            await setDoc(docRef, { followers: count, timestamp: now }).catch(() => {});
        }

        async function updateTrueGrowthRate(currentCount) {
            // Fallback to session rate if cloud isn't ready
            if (!useCloud || !db || !appId) {
                updateSessionRate(currentCount);
                return;
            }

            try {
                const oneHourAgo = Date.now() - (60 * 60 * 1000);
                const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                const snapshot = await getDocs(historyRef);

                if (snapshot.empty) return updateSessionRate(currentCount);

                let records = [];
                snapshot.forEach(doc => records.push(doc.data()));
                const recentRecords = records.filter(r => r.timestamp >= oneHourAgo);

                if (recentRecords.length === 0) return updateSessionRate(currentCount);

                recentRecords.sort((a, b) => a.timestamp - b.timestamp);
                const oldestRecord = recentRecords[0];
                const timePassedInHours = (Date.now() - oldestRecord.timestamp) / (1000 * 60 * 60);

                if (timePassedInHours < 0.003) return updateSessionRate(currentCount); // < 10 secs

                const gained = currentCount - oldestRecord.followers;
                const trueRate = (gained / timePassedInHours).toFixed(2);
                renderRateUI(trueRate);

                // Background cleanup
                const twoHoursAgo = Date.now() - (120 * 60 * 1000);
                records.forEach(r => {
                    if (r.timestamp < twoHoursAgo) {
                        deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', r.timestamp.toString())).catch(()=>{});
                    }
                });
            } catch (e) { updateSessionRate(currentCount); }
        }

        function updateSessionRate(currentCount) {
            if (sessionData.startCount && sessionData.startTime) {
                const gain = currentCount - sessionData.startCount;
                const elapsedHours = (Date.now() - sessionData.startTime) / 3600000;
                if (elapsedHours > 0) renderRateUI((gain / elapsedHours).toFixed(2));
            } else { renderRateUI(0); }
        }

        function renderRateUI(rate) {
            const el = document.getElementById('growth-rate');
            const num = parseFloat(rate);
            el.innerHTML = `${num >= 0 ? '+' : ''}${num.toFixed(2)} <span class="text-xs font-normal">/hr</span>`;
            el.className = `text-xl font-bold ${num >= 0 ? 'text-green-400' : 'text-red-400'}`;
        }

        async function fetchFollowers() {
            const timerEl = document.getElementById('update-timer');
            timerEl.innerText = "Refreshing...";

            try {
                const finalUrl = PROXY_URL + encodeURIComponent(`${API_URL}?t=${Date.now()}`);
                const response = await fetch(finalUrl, { cache: "no-store" });
                const data = await response.json();
                const currentCount = data.count;

                lastKnownFollowerCount = currentCount;
                saveToHistory(currentCount);

                if (!sessionData.startCount) {
                    sessionData = { startCount: currentCount, startTime: Date.now() };
                    localStorage.setItem('rbx_session', JSON.stringify(sessionData));
                    if (useCloud) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'session_storage', 'current');
                        setDoc(docRef, sessionData).catch(()=>{});
                    }
                }
                
                updateUI(currentCount);
            } catch (error) {
                setStatus("Network Error (Retrying)");
            }
        }

        function updateUI(currentCount) {
            setFollowers(currentCount);
            const gain = sessionData.startCount ? (currentCount - sessionData.startCount) : 0;
            document.getElementById('session-gain').innerText = (gain >= 0 ? '+' : '') + gain;
            updateTrueGrowthRate(currentCount);
        }

        async function handleReset() {
            if (!confirm("Reset session stats?")) return;
            sessionData = { startCount: null, startTime: null };
            localStorage.removeItem('rbx_session');
            if (useCloud) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'session_storage', 'current');
                await deleteDoc(docRef).catch(()=>{});
            }
            fetchFollowers();
        }

        function startLoops() {
            if (window.timerStarted) return;
            window.timerStarted = true;
            setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    countdown = 10;
                    fetchFollowers();
                }
                const timerEl = document.getElementById('update-timer');
                if (timerEl.innerText !== "Refreshing...") {
                    timerEl.innerText = `Updating in ${countdown}s`;
                }
            }, 1000);
            fetchFollowers();
        }

        document.getElementById('reset-session').addEventListener('click', handleReset);
        init();
    </script>
</body>
</html>
